server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/project_d}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:0000}
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: never
  application:
    name: projectD
